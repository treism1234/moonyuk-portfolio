name: Deploy portfolio to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate build
        run: npm run build

      - name: Generate standalone portfolio
        shell: bash
        run: |
          npm run dev > /tmp/moonyuk-vite.log 2>&1 &
          SERVER_PID=$!

          for attempt in {1..60}; do
            if curl --fail --silent http://localhost:3000/ > /dev/null; then
              break
            fi
            if [ "$attempt" -eq 60 ]; then
              cat /tmp/moonyuk-vite.log
              exit 1
            fi
            sleep 2
          done

          node work/build-standalone.mjs
          kill "$SERVER_PID" || true
          mkdir -p _site
          cp outputs/index.html _site/index.html
          touch _site/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
